services:
  gt7_tool:
    build: .
    # container_name removed: allows multiple instances and auto-naming
    restart: unless-stopped
    network_mode: "host"
    volumes:
      # Only mount data directories (excludes .git, node_modules, etc.)
      - ./gt7data:/app/gt7data
      - ./gt7data_imported:/app/gt7data_imported
    environment:
      # PS5 の実IPに合わせる(.env の PS5_IP でも上書き可)
      - PS5_IP=${PS5_IP:-192.168.1.128}
      - PYTHONUNBUFFERED=1
